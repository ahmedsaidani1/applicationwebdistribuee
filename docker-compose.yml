version: '3.8'

services:
  # Configuration Server
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - library-network
    environment:
      - SPRING_PROFILES_ACTIVE=native

  # Eureka Server
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - library-network
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
    depends_on:
      - config-server

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - library-network
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  # MongoDB for Loan Service
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - library-network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
      - MONGO_INITDB_DATABASE=loandb
    volumes:
      - mongodb-data:/data/db

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    networks:
      - library-network
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=dev-file
      - KC_DB_URL_PATH=/opt/keycloak/data/h2/keycloakdb
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/themes:/opt/keycloak/themes
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  # Book Service (Spring Boot + H2)
  book-service:
    build:
      context: ./book-service
      dockerfile: Dockerfile
    container_name: book-service
    ports:
      - "8081:8081"
    networks:
      - library-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    depends_on:
      - eureka-server
      - rabbitmq

  # Loan Service (Node.js + MongoDB)
  loan-service:
    build:
      context: ./loan-service
      dockerfile: Dockerfile
    container_name: loan-service
    ports:
      - "8082:8082"
    networks:
      - library-network
    environment:
      - NODE_ENV=production
      - PORT=8082
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/loandb?authSource=admin
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8761
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - BOOK_SERVICE_URL=http://book-service:8081
    depends_on:
      - mongodb
      - eureka-server
      - rabbitmq
      - book-service

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - library-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=library-realm
      - KEYCLOAK_RESOURCE=library-gateway
    depends_on:
      - eureka-server
      - keycloak
      - book-service
      - loan-service

  # Frontend (React)
  library-frontend:
    build:
      context: ./library-frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_GATEWAY_URL=http://localhost:8080
        - REACT_APP_KEYCLOAK_URL=http://localhost:8180
        - REACT_APP_KEYCLOAK_REALM=library-realm
        - REACT_APP_KEYCLOAK_CLIENT_ID=library-frontend
    container_name: library-frontend
    ports:
      - "3000:80"
    networks:
      - library-network
    depends_on:
      - api-gateway

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - library-network
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    networks:
      - library-network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  library-network:
    driver: bridge

volumes:
  mongodb-data:
  keycloak-data:
  prometheus-data:
  grafana-data:
