spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://config-server:8888/
  cloud:
    gateway:
      routes:
        # Book Service Routes
        - id: book-service
          uri: lb://BOOK-SERVICE
          predicates:
            - Path=/api/books/**
          filters:
            - StripPrefix=1
        
        # Book Service Swagger
        - id: book-service-swagger
          uri: lb://BOOK-SERVICE
          predicates:
            - Path=/book-service/v3/api-docs
          filters:
            - RewritePath=/book-service/v3/api-docs, /v3/api-docs
        
        # Loan Service Routes
        - id: loan-service
          uri: lb://LOAN-SERVICE
          predicates:
            - Path=/api/loans/**
          filters:
            - StripPrefix=1
      
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/library-realm
          jwk-set-uri: http://keycloak:8080/realms/library-realm/protocol/openid-connect/certs

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: false
    hostname: api-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

# Springdoc OpenAPI Configuration
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Book Service
        url: /book-service/v3/api-docs
      - name: Gateway API
        url: /v3/api-docs
  api-docs:
    enabled: true
    path: /v3/api-docs

server:
  port: 8080
