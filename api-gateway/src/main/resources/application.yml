spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://config-server:8888/
  cloud:
    gateway:
      routes:
        # Book Service Routes
        - id: book-service
          uri: lb://BOOK-SERVICE
          predicates:
            - Path=/api/books/**
          filters:
            - StripPrefix=1
        
        # Loan Service Routes
        - id: loan-service
          uri: lb://LOAN-SERVICE
          predicates:
            - Path=/api/loans/**
          filters:
            - StripPrefix=1
      
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/library-realm
          jwk-set-uri: http://keycloak:8080/realms/library-realm/protocol/openid-connect/certs

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: false
    hostname: api-gateway
